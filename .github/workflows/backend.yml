name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'pos-enterprise-backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pos-enterprise-backend/**'

defaults:
  run:
    working-directory: pos-enterprise-backend

env:
  PHP_VERSION: '8.3'
  IMAGE_NAME: ghcr.io/${{ github.repository }}/pos-backend

jobs:
  # ══════════════════════════════════════════════════════════════════
  # JOB 1: Test
  # ══════════════════════════════════════════════════════════════════
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       pos_test
          POSTGRES_USER:     pos_user
          POSTGRES_PASSWORD: pos_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pgsql, pdo_pgsql, redis, mbstring, xml, bcmath, zip
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: pos-enterprise-backend/vendor
          key: composer-${{ hashFiles('pos-enterprise-backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env.testing
        run: |
          cp .env.example .env.testing
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/'        .env.testing
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/'               .env.testing
          sed -i 's/DB_PORT=.*/DB_PORT=5432/'                     .env.testing
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=pos_test/'         .env.testing
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=pos_user/'         .env.testing
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=pos_secret/'       .env.testing
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/'          .env.testing
          sed -i 's/REDIS_PORT=.*/REDIS_PORT=6379/'               .env.testing

      - name: Generate Application Key
        run: php artisan key:generate --env=testing

      - name: Run Database Migrations
        run: php artisan migrate --env=testing --force

      - name: Run PHPUnit Tests with Coverage
        run: php artisan test --env=testing --coverage --coverage-clover=coverage.xml

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: pos-enterprise-backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════════
  # JOB 2: Lint
  # ══════════════════════════════════════════════════════════════════
  lint:
    name: PHP CS Fixer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.php
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════════
  # JOB 3: Build Docker Image
  # ══════════════════════════════════════════════════════════════════
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: pos-enterprise-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════
  # JOB 4: Deploy Gate (main only)
  # ══════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/pos-enterprise
            docker-compose -f docker-compose.prod.yml pull backend
            docker-compose -f docker-compose.prod.yml up -d --no-deps backend queue scheduler
            docker-compose -f docker-compose.prod.yml exec -T backend php artisan migrate --force
            docker-compose -f docker-compose.prod.yml exec -T backend php artisan config:cache
            docker-compose -f docker-compose.prod.yml exec -T backend php artisan route:cache
            echo "✅ Deployment selesai: $(date)"
