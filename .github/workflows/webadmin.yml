name: Web Admin CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'pos-enterprise-webadmin/**'
      - '.github/workflows/webadmin.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pos-enterprise-webadmin/**'

defaults:
  run:
    working-directory: pos-enterprise-webadmin

jobs:
  # ══════════════════════════════════════════════════════════════════
  # JOB 1: Test
  # ══════════════════════════════════════════════════════════════════
  test:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pos-enterprise-webadmin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with Coverage
        run: npm run test -- --coverage --reporter=verbose

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          directory: pos-enterprise-webadmin/coverage
          flags: webadmin
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════════
  # JOB 2: Lint
  # ══════════════════════════════════════════════════════════════════
  lint:
    name: ESLint + TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pos-enterprise-webadmin/package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true
      - name: ESLint
        run: npm run lint
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════════
  # JOB 3: Build Production
  # ══════════════════════════════════════════════════════════════════
  build:
    name: Vite Production Build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pos-enterprise-webadmin/package-lock.json
      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || '/api/v1' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webadmin-dist
          path: pos-enterprise-webadmin/dist
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════
  # JOB 4: Deploy (main only)
  # ══════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: webadmin-dist
          path: dist

      - name: Deploy via Rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete
          path:   dist/
          remote_path: ${{ secrets.WEB_DEPLOY_PATH }}/
          remote_host: ${{ secrets.STAGING_HOST }}
          remote_user: ${{ secrets.STAGING_USER }}
          remote_key:  ${{ secrets.STAGING_SSH_KEY }}
