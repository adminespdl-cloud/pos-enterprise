# nixpacks.toml — Konfigurasi build Railway untuk Laravel 12
# Docs: https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["php83", "php83Extensions.pgsql", "php83Extensions.pdo", "php83Extensions.mbstring", "php83Extensions.bcmath", "php83Extensions.opcache", "php83Extensions.curl", "php83Extensions.gd", "php83Extensions.zip", "php83Extensions.xml", "php83Extensions.tokenizer", "php83Extensions.fileinfo", "php83Extensions.ctype", "composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-interaction --no-scripts"
]

# CATATAN:
# - config:cache/route:cache TIDAK di build phase (env vars baru ada saat runtime)
# - migrate --force DIHAPUS dari start (jika gagal, server tidak mau start dan Railway rollback)
# - Migrasi dilakukan via endpoint HTTP /api/force-migrate setelah server live

[start]
cmd = "php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan serve --host=0.0.0.0 --port=$PORT"
