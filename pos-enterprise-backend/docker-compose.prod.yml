name: pos-enterprise-prod

# ═══════════════════════════════════════════════════════════════════
# POS Enterprise — Production Docker Compose Stack
#
# Services:
#   nginx      → Reverse proxy + SSL termination
#   backend    → Laravel 12 (PHP-FPM 8.3)
#   queue      → Laravel Queue Worker
#   scheduler  → Laravel Cron Scheduler
#   postgres   → PostgreSQL 16 (primary DB)
#   redis      → Redis 7 (cache + queue + sessions)
#   certbot    → Let's Encrypt auto-renew
# ═══════════════════════════════════════════════════════════════════

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
  webadmin_dist:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true     # Tidak bisa akses internet langsung
  proxy:
    driver: bridge     # Nginx satu-satunya yang expose ke luar

services:

  # ── Nginx (Reverse Proxy + SSL) ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - webadmin_dist:/var/www/webadmin:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - proxy
      - internal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend (Laravel PHP-FPM) ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      target: production
    image: pos-backend:latest
    container_name: pos_backend
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Queue Worker ─────────────────────────────────────────────────
  queue:
    image: pos-backend:latest
    container_name: pos_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis",
              "--sleep=3", "--tries=3", "--timeout=90",
              "--max-jobs=1000", "--memory=256"]
    env_file: .env.production
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  # ── Scheduler ────────────────────────────────────────────────────
  scheduler:
    image: pos-backend:latest
    container_name: pos_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file: .env.production
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy

  # ── PostgreSQL 16 ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_DATABASE}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    # Tidak expose port ke host (akses hanya via internal network)
    expose:
      - "5432"

  # ── Redis 7 ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "6379"

  # ── Certbot (Let's Encrypt auto-renew) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: pos_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - proxy
    # Cek renewal setiap 12 jam
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
