# ═══════════════════════════════════════════════════════════════════
# POS Enterprise — Production nginx.conf
# ═══════════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;   # Sembunyikan versi nginx
    client_max_body_size 20M;

    # ── Gzip ────────────────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        application/json
        application/javascript
        application/x-www-form-urlencoded
        text/css
        text/html
        text/plain
        text/xml;

    # ── Rate Limiting Zones ─────────────────────────────────────────
    # API umum: 20 req/s per IP
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=20r/s;
    # Auth endpoints: 5 req/mnt (anti brute-force)
    limit_req_zone  $binary_remote_addr  zone=auth:10m  rate=5r/m;
    # Sync endpoint: 10 req/s (device bisa burst saat reconnect)
    limit_req_zone  $binary_remote_addr  zone=sync:10m  rate=10r/s;

    # ── FastCGI Cache ────────────────────────────────────────────────
    fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=LARAVEL:10m
                       max_size=100m inactive=60m use_temp_path=off;

    include /etc/nginx/conf.d/*.conf;
}
