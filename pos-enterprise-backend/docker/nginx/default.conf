# ═══════════════════════════════════════════════════════════════════
# POS Enterprise — Server Block (API + Web Admin)
# Ganti YOUR_DOMAIN dengan domain asli, misal: pos.bisnisku.id
# ═══════════════════════════════════════════════════════════════════

# ── Redirect HTTP → HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API Backend (api.YOUR_DOMAIN) ────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.YOUR_DOMAIN;

    # SSL (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api.YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    root /var/www/html/public;
    index index.php;

    # ── Security Headers ─────────────────────────────────────────
    add_header X-Frame-Options          "DENY"              always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin"     always;
    add_header Permissions-Policy       "camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy  "default-src 'none'; frame-ancestors 'none'" always;

    # ── Rate Limiting per endpoint ───────────────────────────────
    location /api/v1/auth/login    { limit_req zone=auth burst=3 nodelay; include snippets/php-fpm.conf; }
    location /api/v1/auth/pin-login{ limit_req zone=auth burst=3 nodelay; include snippets/php-fpm.conf; }
    location /api/v1/sync/         { limit_req zone=sync burst=20 nodelay; include snippets/php-fpm.conf; }
    location /api/                 { limit_req zone=api  burst=40 nodelay; include snippets/php-fpm.conf; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/php-fpm.conf;
    }

    # ── Block sensitive files ─────────────────────────────────────
    location ~ /\.(env|git|htaccess) { deny all; return 404; }
    location ~ /(storage|bootstrap/cache)/ { deny all; return 404; }

    # ── Health check (tidak perlu auth) ──────────────────────────
    location = /api/health {
        limit_req  off;
        access_log off;
        include    snippets/php-fpm.conf;
    }
}

# ── Web Admin (YOUR_DOMAIN) ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/webadmin;
    index index.html;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # SPA routing — semua request ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Jangan cache index.html (untuk update SPA)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
