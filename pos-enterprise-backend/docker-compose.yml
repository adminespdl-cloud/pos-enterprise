version: '3.9'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pos_enterprise_db
    environment:
      POSTGRES_DB: pos_enterprise
      POSTGRES_USER: pos_app_user
      POSTGRES_PASSWORD: pos_secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_app_user -d pos_enterprise"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Queue) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pos_enterprise_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Laravel Backend API ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: pos_enterprise_backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: pos_enterprise
      DB_USERNAME: pos_app_user
      DB_PASSWORD: pos_secret_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  # ─── Laravel Queue Worker ────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: pos_enterprise_queue
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/var/www/html
    depends_on:
      - backend
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600

volumes:
  postgres_data:
  redis_data:
